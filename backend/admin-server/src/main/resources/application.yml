server:
  port: 8090

spring:
  application:
    name: admin-server
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USER:guest}
    password: ${RABBITMQ_PASSWORD:guest}

admin:
  upstream:
    auth-base-url: ${AUTH_SERVICE_BASE_URL:http://localhost:8080}
    booking-base-url: ${BOOKING_SERVICE_BASE_URL:http://localhost:8080}
    payment-base-url: ${PAYMENT_SERVICE_BASE_URL:http://localhost:8080}
    airline-airport-base-url: ${AIRLINE_AIRPORT_SERVICE_BASE_URL:http://localhost:8080}
    flight-base-url: ${FLIGHT_SERVICE_BASE_URL:http://localhost:8080}
    passenger-base-url: ${PASSENGER_SERVICE_BASE_URL:http://localhost:8080}
  notification:
    exchange: ${NOTIFICATION_EVENT_EXCHANGE:skybooker.events}
    routing:
      flight-delayed: ${NOTIFICATION_ROUTING_FLIGHT_DELAYED:flight.delayed}
      flight-cancelled: ${NOTIFICATION_ROUTING_FLIGHT_CANCELLED:flight.cancelled}
      booking-cancelled: ${NOTIFICATION_ROUTING_BOOKING_CANCELLED:booking.cancelled}

springdoc:
  swagger-ui:
    path: /swagger-ui

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_DEFAULT_ZONE:http://localhost:8761/eureka/}

management:
  endpoints:
    web:
      exposure:
        include: health,info
