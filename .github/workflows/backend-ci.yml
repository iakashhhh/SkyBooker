name: Backend CI

on:
  push:
  pull_request:

concurrency:
  group: backend-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build & Test ${{ matrix.service }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        service:
          - admin-server
          - airline-airport-service
          - api-gateway
          - auth-service
          - booking-service
          - eureka-server
          - flight-service
          - notification-service
          - passenger-service
          - payment-service
          - seat-service

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Build and run tests
        run: mvn -B -f backend/${{ matrix.service }}/pom.xml clean verify

  sonarqube:
    name: SonarQube Analysis
    runs-on: ubuntu-latest
    needs: build-and-test
    if: ${{ github.event_name == 'push' }}
    env:
      SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      SONAR_HOST_IP: ${{ secrets.SONAR_HOST_IP }}
    steps:
      - name: Check SonarQube availability
        id: sonar-ready
        run: |
          if [[ -z "${SONAR_HOST_URL}" || -z "${SONAR_TOKEN}" ]]; then
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "SonarQube secrets are missing. Skipping Sonar scan."
            exit 0
          fi

          if curl -fsS --retry 5 --retry-all-errors --retry-delay 3 --connect-timeout 10 --max-time 60 "${SONAR_HOST_URL}/api/system/status" >/dev/null; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          elif [[ -n "${SONAR_HOST_IP}" ]]; then
            host_name="$(echo "${SONAR_HOST_URL}" | sed -E 's#https?://([^/]+).*#\1#')"
            echo "${SONAR_HOST_IP} ${host_name}" | sudo tee -a /etc/hosts >/dev/null
            if curl -fsS --retry 5 --retry-all-errors --retry-delay 3 --connect-timeout 10 --max-time 60 "${SONAR_HOST_URL}/api/system/status" >/dev/null; then
              echo "enabled=true" >> "$GITHUB_OUTPUT"
            else
              echo "enabled=false" >> "$GITHUB_OUTPUT"
              echo "SonarQube is unreachable at ${SONAR_HOST_URL}, even with SONAR_HOST_IP fallback. Skipping Sonar scan."
            fi
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "SonarQube is unreachable at ${SONAR_HOST_URL}. Skipping Sonar scan."
          fi

      - name: Checkout repository
        if: ${{ steps.sonar-ready.outputs.enabled == 'true' }}
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        if: ${{ steps.sonar-ready.outputs.enabled == 'true' }}
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Set up Node.js 20
        if: ${{ steps.sonar-ready.outputs.enabled == 'true' }}
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Generate backend coverage reports
        if: ${{ steps.sonar-ready.outputs.enabled == 'true' }}
        run: |
          services=(
            admin-server airline-airport-service api-gateway auth-service booking-service
            eureka-server flight-service notification-service passenger-service payment-service seat-service
          )
          for service in "${services[@]}"; do
            mvn -B -f "backend/${service}/pom.xml" clean verify
          done

      - name: Generate frontend coverage report
        if: ${{ steps.sonar-ready.outputs.enabled == 'true' }}
        working-directory: frontend
        run: |
          npm ci
          npm test -- --watch=false --browsers=ChromeHeadless --code-coverage

      - name: Publish backend services to SonarQube (separate projects)
        if: ${{ steps.sonar-ready.outputs.enabled == 'true' }}
        run: |
          services=(
            admin-server airline-airport-service api-gateway auth-service booking-service
            eureka-server flight-service notification-service passenger-service payment-service seat-service
          )
          for service in "${services[@]}"; do
            echo "Publishing SonarQube project: skybooker-${service}"
            mvn -B -f "backend/${service}/pom.xml" sonar:sonar \
              -Dsonar.projectKey="skybooker-${service}" \
              -Dsonar.projectName="SkyBooker ${service}" \
              -Dsonar.projectVersion="${GITHUB_SHA}" \
              -Dsonar.host.url="${SONAR_HOST_URL}" \
              -Dsonar.token="${SONAR_TOKEN}" \
              -Dsonar.coverage.jacoco.xmlReportPaths="target/site/jacoco/jacoco.xml"
          done

      - name: Publish frontend to SonarQube (separate project)
        if: ${{ steps.sonar-ready.outputs.enabled == 'true' }}
        uses: SonarSource/sonarqube-scan-action@v6
        with:
          projectBaseDir: frontend
          args: >
            -Dsonar.projectKey=skybooker-frontend
            -Dsonar.projectName=SkyBooker Frontend
            -Dsonar.projectVersion=${{ github.sha }}
            -Dsonar.sources=src
            -Dsonar.tests=src
            -Dsonar.test.inclusions=src/**/*.spec.ts
            -Dsonar.exclusions=src/**/*.spec.ts
            -Dsonar.javascript.lcov.reportPaths=coverage/lcov.info
        env:
          SONAR_HOST_URL: ${{ env.SONAR_HOST_URL }}
          SONAR_TOKEN: ${{ env.SONAR_TOKEN }}

  discover-docker-images:
    name: Discover Backend Docker Images
    runs-on: ubuntu-latest
    needs: build-and-test
    outputs:
      matrix: ${{ steps.generate.outputs.matrix }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate backend Docker matrix from compose
        id: generate
        run: |
          matrix_json="$(COMPOSE_FILE=docker-compose.yml CONTEXT_PREFIX=backend/ ruby scripts/ci/docker-build-matrix.rb)"
          echo "matrix=$matrix_json" >> "$GITHUB_OUTPUT"
          echo "Detected backend build targets: $matrix_json"

  docker-build:
    name: Docker Build/Push ${{ matrix.image.service }}
    runs-on: ubuntu-latest
    needs: discover-docker-images
    if: ${{ needs.discover-docker-images.outputs.matrix != '[]' }}
    strategy:
      fail-fast: false
      matrix:
        image: ${{ fromJson(needs.discover-docker-images.outputs.matrix) }}
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Decide whether image push is allowed
        id: push-policy
        run: |
          if [[ "${{ github.event_name }}" == "push" && "${{ github.ref }}" == "refs/heads/main" ]]; then
            echo "push=true" >> "$GITHUB_OUTPUT"
          else
            echo "push=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Log in to Docker Hub
        if: ${{ steps.push-policy.outputs.push == 'true' }}
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/skybooker-${{ matrix.image.service }}
          tags: |
            type=raw,value=sha-${{ github.sha }}
            type=raw,value=run-${{ github.run_number }}
            type=raw,value=latest,enable=${{ steps.push-policy.outputs.push == 'true' }}

      - name: Build and optionally push backend Docker image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.image.context }}
          file: ${{ matrix.image.dockerfile }}
          push: ${{ steps.push-policy.outputs.push == 'true' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=backend-${{ matrix.image.service }}
          cache-to: type=gha,mode=max,scope=backend-${{ matrix.image.service }}
