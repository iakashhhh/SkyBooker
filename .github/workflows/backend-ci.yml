name: Backend CI

on:
  push:
  pull_request:

jobs:
  build-and-test:
    name: Build & Test ${{ matrix.service }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        service:
          - admin-server
          - airline-airport-service
          - api-gateway
          - auth-service
          - booking-service
          - eureka-server
          - flight-service
          - notification-service
          - passenger-service
          - payment-service
          - seat-service

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Build and run tests
        run: |
          mvn -B -f backend/${{ matrix.service }}/pom.xml clean test
