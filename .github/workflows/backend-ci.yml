name: Backend CI

on:
  push:
  pull_request:

concurrency:
  group: backend-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build & Test ${{ matrix.service }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        service:
          - admin-server
          - airline-airport-service
          - api-gateway
          - auth-service
          - booking-service
          - eureka-server
          - flight-service
          - notification-service
          - passenger-service
          - payment-service
          - seat-service

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Build and run tests
        run: mvn -B -f backend/${{ matrix.service }}/pom.xml clean verify

  sonarqube:
    name: SonarQube Analysis
    runs-on: ubuntu-latest
    needs: build-and-test
    if: ${{ github.event_name == 'push' && secrets.SONAR_HOST_URL != '' && secrets.SONAR_TOKEN != '' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Generate backend coverage reports
        run: |
          services=(
            admin-server airline-airport-service api-gateway auth-service booking-service
            eureka-server flight-service notification-service passenger-service payment-service seat-service
          )
          for service in "${services[@]}"; do
            mvn -B -f "backend/${service}/pom.xml" clean verify
          done

      - name: Generate frontend coverage report
        working-directory: frontend
        run: |
          npm ci
          npm test -- --watch=false --browsers=ChromeHeadless --code-coverage

      - name: Run SonarQube scan
        uses: SonarSource/sonarqube-scan-action@v5
        env:
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  discover-docker-images:
    name: Discover Backend Docker Images
    runs-on: ubuntu-latest
    needs: build-and-test
    outputs:
      matrix: ${{ steps.generate.outputs.matrix }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate backend Docker matrix from compose
        id: generate
        run: |
          matrix_json="$(COMPOSE_FILE=docker-compose.yml CONTEXT_PREFIX=backend/ ruby scripts/ci/docker-build-matrix.rb)"
          echo "matrix=$matrix_json" >> "$GITHUB_OUTPUT"
          echo "Detected backend build targets: $matrix_json"

  docker-build:
    name: Docker Build/Push ${{ matrix.image.service }}
    runs-on: ubuntu-latest
    needs: discover-docker-images
    if: ${{ needs.discover-docker-images.outputs.matrix != '[]' }}
    strategy:
      fail-fast: false
      matrix:
        image: ${{ fromJson(needs.discover-docker-images.outputs.matrix) }}
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Decide whether image push is allowed
        id: push-policy
        run: |
          if [[ "${{ github.event_name }}" == "push" && "${{ github.ref }}" == "refs/heads/main" ]]; then
            echo "push=true" >> "$GITHUB_OUTPUT"
          else
            echo "push=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Log in to Docker Hub
        if: ${{ steps.push-policy.outputs.push == 'true' }}
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/skybooker-${{ matrix.image.service }}
          tags: |
            type=raw,value=sha-${{ github.sha }}
            type=raw,value=run-${{ github.run_number }}
            type=raw,value=latest,enable=${{ steps.push-policy.outputs.push == 'true' }}

      - name: Build and optionally push backend Docker image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.image.context }}
          file: ${{ matrix.image.dockerfile }}
          push: ${{ steps.push-policy.outputs.push == 'true' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=backend-${{ matrix.image.service }}
          cache-to: type=gha,mode=max,scope=backend-${{ matrix.image.service }}
