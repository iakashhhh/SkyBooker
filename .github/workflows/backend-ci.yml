name: Backend CI

on:
  push:
  pull_request:

jobs:
  build-and-test:
    name: Build & Test ${{ matrix.service }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        service:
          - admin-server
          - airline-airport-service
          - api-gateway
          - auth-service
          - booking-service
          - eureka-server
          - flight-service
          - notification-service
          - passenger-service
          - payment-service
          - seat-service

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Build and run tests
        run: |
          mvn -B -f backend/${{ matrix.service }}/pom.xml clean test

  discover-docker-images:
    name: Discover Backend Docker Images
    runs-on: ubuntu-latest
    needs: build-and-test
    outputs:
      matrix: ${{ steps.generate.outputs.matrix }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate backend Docker matrix from compose
        id: generate
        run: |
          matrix_json="$(COMPOSE_FILE=docker-compose.yml CONTEXT_PREFIX=backend/ ruby scripts/ci/docker-build-matrix.rb)"
          echo "matrix=$matrix_json" >> "$GITHUB_OUTPUT"
          echo "Detected backend build targets: $matrix_json"

  docker-build:
    name: Docker Build ${{ matrix.image.service }}
    runs-on: ubuntu-latest
    needs: discover-docker-images
    if: ${{ needs.discover-docker-images.outputs.matrix != '[]' }}
    strategy:
      fail-fast: false
      matrix:
        image: ${{ fromJson(needs.discover-docker-images.outputs.matrix) }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend Docker image
        run: |
          docker build \
            --file "${{ matrix.image.dockerfile }}" \
            --tag "skybooker/${{ matrix.image.service }}:sha-${{ github.sha }}" \
            --tag "skybooker/${{ matrix.image.service }}:ci-${{ github.run_number }}" \
            "${{ matrix.image.context }}"
