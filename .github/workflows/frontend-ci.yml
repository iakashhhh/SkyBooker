name: Frontend CI

on:
  push:
  pull_request:

concurrency:
  group: frontend-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build & Test Frontend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build Angular app
        working-directory: frontend
        run: npm run build -- --configuration production

      - name: Run frontend tests
        working-directory: frontend
        run: npm test -- --watch=false --browsers=ChromeHeadless

  discover-docker-images:
    name: Discover Frontend Docker Image
    runs-on: ubuntu-latest
    needs: build-and-test
    outputs:
      matrix: ${{ steps.generate.outputs.matrix }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate frontend Docker matrix from compose
        id: generate
        run: |
          matrix_json="$(COMPOSE_FILE=docker-compose.yml CONTEXT_PREFIX=frontend ruby scripts/ci/docker-build-matrix.rb)"
          echo "matrix=$matrix_json" >> "$GITHUB_OUTPUT"
          echo "Detected frontend build targets: $matrix_json"

  docker-build:
    name: Docker Build/Push ${{ matrix.image.service }}
    runs-on: ubuntu-latest
    needs: discover-docker-images
    if: ${{ needs.discover-docker-images.outputs.matrix != '[]' }}
    strategy:
      fail-fast: false
      matrix:
        image: ${{ fromJson(needs.discover-docker-images.outputs.matrix) }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Decide whether image push is allowed
        id: push-policy
        run: |
          if [[ "${{ github.event_name }}" == "push" && "${{ github.ref }}" == "refs/heads/main" ]]; then
            echo "push=true" >> "$GITHUB_OUTPUT"
          else
            echo "push=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Log in to Docker Hub
        if: ${{ steps.push-policy.outputs.push == 'true' }}
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/skybooker-${{ matrix.image.service }}
          tags: |
            type=raw,value=sha-${{ github.sha }}
            type=raw,value=run-${{ github.run_number }}
            type=raw,value=latest,enable=${{ steps.push-policy.outputs.push == 'true' }}

      - name: Build and optionally push frontend Docker image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.image.context }}
          file: ${{ matrix.image.dockerfile }}
          push: ${{ steps.push-policy.outputs.push == 'true' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=frontend-${{ matrix.image.service }}
          cache-to: type=gha,mode=max,scope=frontend-${{ matrix.image.service }}
