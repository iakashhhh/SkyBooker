name: Frontend CI

on:
  push:
  pull_request:

jobs:
  build-and-test:
    name: Build & Test Frontend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build Angular app
        working-directory: frontend
        run: npm run build -- --configuration production

      - name: Run frontend tests
        working-directory: frontend
        run: npm test -- --watch=false --browsers=ChromeHeadless

  discover-docker-images:
    name: Discover Frontend Docker Image
    runs-on: ubuntu-latest
    needs: build-and-test
    outputs:
      matrix: ${{ steps.generate.outputs.matrix }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate frontend Docker matrix from compose
        id: generate
        run: |
          matrix_json="$(COMPOSE_FILE=docker-compose.yml CONTEXT_PREFIX=frontend ruby scripts/ci/docker-build-matrix.rb)"
          echo "matrix=$matrix_json" >> "$GITHUB_OUTPUT"
          echo "Detected frontend build targets: $matrix_json"

  docker-build:
    name: Docker Build/Push ${{ matrix.image.service }}
    runs-on: ubuntu-latest
    needs: discover-docker-images
    if: ${{ needs.discover-docker-images.outputs.matrix != '[]' }}
    strategy:
      fail-fast: false
      matrix:
        image: ${{ fromJson(needs.discover-docker-images.outputs.matrix) }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        if: ${{ github.event_name == 'push' }}
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build frontend Docker image
        run: |
          IMAGE_BASE="${{ secrets.DOCKERHUB_USERNAME }}/skybooker-${{ matrix.image.service }}"
          docker build \
            --file "${{ matrix.image.dockerfile }}" \
            --tag "${IMAGE_BASE}:latest" \
            --tag "${IMAGE_BASE}:sha-${{ github.sha }}" \
            --tag "${IMAGE_BASE}:ci-${{ github.run_number }}" \
            "${{ matrix.image.context }}"

      - name: Push frontend Docker image
        if: ${{ github.event_name == 'push' }}
        run: |
          IMAGE_BASE="${{ secrets.DOCKERHUB_USERNAME }}/skybooker-${{ matrix.image.service }}"
          docker push "${IMAGE_BASE}:latest"
          docker push "${IMAGE_BASE}:sha-${{ github.sha }}"
          docker push "${IMAGE_BASE}:ci-${{ github.run_number }}"
