name: skybooker

x-common-java-env: &common-java-env
  EUREKA_DEFAULT_ZONE: http://eureka-server:8761/eureka/
  JAVA_TOOL_OPTIONS: -XX:MaxRAMPercentage=50.0 -XX:InitialRAMPercentage=5.0 -XX:+UseSerialGC

x-default-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"

services:
  mysql:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: auth_db
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -proot"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 20s
    logging: *default-logging

  rabbitmq:
    image: rabbitmq:3.13-management
    restart: unless-stopped
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    logging: *default-logging

  mailpit:
    image: axllent/mailpit:v1.21
    restart: unless-stopped
    ports:
      - "1025:1025"
      - "8025:8025"
    logging: *default-logging

  eureka-server:
    build:
      context: ./backend/eureka-server
    restart: unless-stopped
    ports:
      - "8761:8761"
    environment:
      JAVA_TOOL_OPTIONS: -XX:MaxRAMPercentage=50.0 -XX:InitialRAMPercentage=5.0 -XX:+UseSerialGC
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8761/actuator/health | grep -q \"UP\""]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 40s
    logging: *default-logging

  api-gateway:
    build:
      context: ./backend/api-gateway
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      <<: *common-java-env
      CORS_ALLOWED_ORIGIN: http://localhost:4200
    depends_on:
      eureka-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health | grep -q \"UP\""]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 40s
    logging: *default-logging

  admin-server:
    build:
      context: ./backend/admin-server
    restart: unless-stopped
    ports:
      - "8090:8090"
    environment:
      <<: *common-java-env
      AUTH_SERVICE_BASE_URL: http://api-gateway:8080
      BOOKING_SERVICE_BASE_URL: http://api-gateway:8080
      PAYMENT_SERVICE_BASE_URL: http://api-gateway:8080
      AIRLINE_AIRPORT_SERVICE_BASE_URL: http://api-gateway:8080
      FLIGHT_SERVICE_BASE_URL: http://api-gateway:8080
      PASSENGER_SERVICE_BASE_URL: http://api-gateway:8080
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: guest
      RABBITMQ_PASSWORD: guest
    depends_on:
      eureka-server:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    logging: *default-logging

  auth-service:
    build:
      context: ./backend/auth-service
    restart: unless-stopped
    ports:
      - "8081:8081"
    env_file:
      - ./.env
    environment:
      <<: *common-java-env
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_DB: auth_db
      MYSQL_USER: root
      MYSQL_PASSWORD: root
      AIRLINE_AIRPORT_SERVICE_BASE_URL: http://api-gateway:8080
    depends_on:
      eureka-server:
        condition: service_healthy
      mysql:
        condition: service_healthy
    logging: *default-logging

  flight-service:
    build:
      context: ./backend/flight-service
    restart: unless-stopped
    ports:
      - "8082:8082"
    environment:
      <<: *common-java-env
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_DB: flight_db
      MYSQL_USER: root
      MYSQL_PASSWORD: root
      FLIGHT_UPSTREAM_AIRLINE_AIRPORT_BASE_URL: http://airline-airport-service:8089
      FLIGHT_UPSTREAM_BOOKING_BASE_URL: http://booking-service:8084
    depends_on:
      eureka-server:
        condition: service_healthy
      mysql:
        condition: service_healthy
      airline-airport-service:
        condition: service_started
    logging: *default-logging

  seat-service:
    build:
      context: ./backend/seat-service
    restart: unless-stopped
    ports:
      - "8085:8085"
    environment:
      <<: *common-java-env
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_DB: seat_db
      MYSQL_USER: root
      MYSQL_PASSWORD: root
    depends_on:
      eureka-server:
        condition: service_healthy
      mysql:
        condition: service_healthy
    logging: *default-logging

  booking-service:
    build:
      context: ./backend/booking-service
    restart: unless-stopped
    ports:
      - "8084:8084"
    environment:
      <<: *common-java-env
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_DB: booking_db
      MYSQL_USER: root
      MYSQL_PASSWORD: root
      FLIGHT_SERVICE_BASE_URL: http://api-gateway:8080
      SEAT_SERVICE_BASE_URL: http://api-gateway:8080
      PAYMENT_SERVICE_BASE_URL: http://api-gateway:8080
      PAYMENT_INTEGRATION_ENABLED: "true"
      RABBITMQ_HOST: rabbitmq
    depends_on:
      eureka-server:
        condition: service_healthy
      mysql:
        condition: service_healthy
      api-gateway:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    logging: *default-logging

  passenger-service:
    build:
      context: ./backend/passenger-service
    restart: unless-stopped
    ports:
      - "8086:8086"
    environment:
      <<: *common-java-env
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_DB: passenger_db
      MYSQL_USER: root
      MYSQL_PASSWORD: root
    depends_on:
      eureka-server:
        condition: service_healthy
      mysql:
        condition: service_healthy
    logging: *default-logging

  payment-service:
    build:
      context: ./backend/payment-service
    restart: unless-stopped
    ports:
      - "8087:8087"
    env_file:
      - ./.env
    environment:
      <<: *common-java-env
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_DB: payment_db
      MYSQL_USER: root
      MYSQL_PASSWORD: root
      BOOKING_SERVICE_BASE_URL: http://api-gateway:8080
      RABBITMQ_HOST: rabbitmq
    depends_on:
      eureka-server:
        condition: service_healthy
      mysql:
        condition: service_healthy
      api-gateway:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    logging: *default-logging

  notification-service:
    build:
      context: ./backend/notification-service
    restart: unless-stopped
    ports:
      - "8088:8088"
    env_file:
      - ./.env
    environment:
      <<: *common-java-env
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_DB: notification_db
      MYSQL_USER: root
      MYSQL_PASSWORD: root
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: guest
      RABBITMQ_PASSWORD: guest
      BOOKING_SERVICE_BASE_URL: http://api-gateway:8080
      AUTH_SERVICE_BASE_URL: http://api-gateway:8080
      FLIGHT_SERVICE_BASE_URL: http://api-gateway:8080
      MAIL_HOST: ${MAIL_HOST:-mailpit}
      MAIL_PORT: ${MAIL_PORT:-1025}
      MAIL_USERNAME: ${MAIL_USERNAME:-}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-}
      MAIL_SMTP_AUTH: ${MAIL_SMTP_AUTH:-false}
      MAIL_SMTP_STARTTLS: ${MAIL_SMTP_STARTTLS:-false}
      NOTIFICATION_EMAIL_FROM: ${NOTIFICATION_EMAIL_FROM:-noreply@skybooker.com}
    depends_on:
      eureka-server:
        condition: service_healthy
      mysql:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      mailpit:
        condition: service_started
    logging: *default-logging

  airline-airport-service:
    build:
      context: ./backend/airline-airport-service
    restart: unless-stopped
    ports:
      - "8089:8089"
    environment:
      <<: *common-java-env
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_DB: airline_airport_db
      MYSQL_USER: root
      MYSQL_PASSWORD: root
    depends_on:
      eureka-server:
        condition: service_healthy
      mysql:
        condition: service_healthy
    logging: *default-logging

  frontend:
    build:
      context: ./frontend
    restart: unless-stopped
    ports:
      - "4200:80"
    env_file:
      - ./.env
    depends_on:
      api-gateway:
        condition: service_healthy
    logging: *default-logging

  sonardb:
    image: postgres:15
    restart: unless-stopped
    environment:
      POSTGRES_USER: sonar
      POSTGRES_PASSWORD: sonar
      POSTGRES_DB: sonarqube
    volumes:
      - sonar_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sonar -d sonarqube"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 20s
    logging: *default-logging

  sonarqube:
    image: sonarqube:lts
    restart: unless-stopped
    ports:
      - "9000:9000"
    environment:
      SONAR_JDBC_URL: jdbc:postgresql://sonardb:5432/sonarqube
      SONAR_JDBC_USERNAME: sonar
      SONAR_JDBC_PASSWORD: sonar
      SONAR_WEB_JAVAOPTS: -Xms128m -Xmx256m -XX:+HeapDumpOnOutOfMemoryError
      SONAR_CE_JAVAOPTS: -Xms128m -Xmx256m -XX:+HeapDumpOnOutOfMemoryError
      SONAR_SEARCH_JAVAOPTS: -Xms256m -Xmx256m -XX:+HeapDumpOnOutOfMemoryError
    depends_on:
      sonardb:
        condition: service_healthy
    volumes:
      - sonar_data:/opt/sonarqube/data
      - sonar_extensions:/opt/sonarqube/extensions
      - sonar_logs:/opt/sonarqube/logs
      - sonar_temp:/opt/sonarqube/temp
    logging: *default-logging

volumes:
  mysql_data:
  rabbitmq_data:
  sonar_postgres_data:
  sonar_data:
  sonar_extensions:
  sonar_logs:
  sonar_temp:
